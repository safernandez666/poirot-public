# =============================================================================
# Poirot DSPM — docker compose (pre-built images from Docker Hub)
#
# Usage:
#   cp .env.example .env
#   docker compose up -d                       # only Poirot
#   docker compose --profile demo up -d        # Poirot + sample data sources
#   docker compose --profile oracle up -d      # Poirot + Oracle XE demo
#   docker compose --profile thehive up -d     # Poirot + TheHive case mgmt
#   docker compose --profile ollama up -d      # Poirot + AI reports
#   open http://localhost:8080
#
# Pin a specific build:
#   POIROT_TAG=abc1234 docker compose up -d
# =============================================================================

services:

  # Extracts default config files from the image on first run.
  init:
    image: safernandez666/poirot-scanner:${POIROT_TAG:-latest}
    container_name: poirot-init
    user: root
    volumes:
      - ./config:/output
    command: >
      sh -c "
        mkdir -p /output;
        [ -f /output/connection.yml ] || cp /app/connection.yml /output/connection.yml;
        [ -f /output/fingerprint.yml ] || cp /app/fingerprint.yml /output/fingerprint.yml;
        [ -f /output/.env ] || { echo 'AUTH_ENABLED=true'; echo 'KEYCLOAK_PUBLIC_URL=http://localhost:8180'; echo 'KC_HOSTNAME=http://localhost:8180'; } > /output/.env;
        echo 'Config ready.';
      "
    restart: "no"

  # ============================================================================
  # CORE — always started
  # ============================================================================

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak
    command: start-dev --import-realm --health-enabled=true
    env_file:
      - path: ./config/.env
        required: false
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_DB: dev-file
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8080
      KC_PROXY_HEADERS: xforwarded
      KC_SSL_REQUIRED: ${KC_SSL_REQUIRED:-none}
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/poirot-realm.json:/opt/keycloak/data/import/poirot-realm.json:ro
      - ./keycloak/themes/poirot:/opt/keycloak/themes/poirot:ro
      - keycloak_data:/opt/keycloak/data
    networks:
      - hawk-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /realms/master HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && timeout 1 cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  scanner:
    image: safernandez666/poirot-scanner:${POIROT_TAG:-latest}
    container_name: hawk-scanner
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      init:
        condition: service_completed_successfully
    env_file:
      - path: ./config/.env
        required: false
    environment:
      - PYTHONIOENCODING=utf-8
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    volumes:
      - ./config/connection.yml:/app/connection.yml
      - ./config/fingerprint.yml:/app/fingerprint.yml
      - poirot_data:/app/data
      - scanner_sources:/app/sources
    command: tail -f /dev/null
    networks:
      - hawk-network

  dashboard:
    image: safernandez666/poirot-dashboard:${POIROT_TAG:-latest}
    container_name: hawk-dashboard
    security_opt:
      - no-new-privileges:false
      - seccomp:unconfined
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      init:
        condition: service_completed_successfully
      scanner:
        condition: service_started
      keycloak:
        condition: service_healthy
    ports:
      - "8080:80"
    env_file:
      - path: ./config/.env
        required: false
    environment:
      - ALERTS_DB_PATH=/app/data/alerts.db
      - FINGERPRINT_PATH=/app/config/fingerprint.yml
      - CONNECTION_PATH=/app/config/connection.yml
      - FLASK_DEBUG=false
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=poirot
      - KEYCLOAK_CLIENT_ID=poirot-api
      - KEYCLOAK_PUBLIC_URL=${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}
    volumes:
      - ./config/connection.yml:/app/config/connection.yml
      - ./config/fingerprint.yml:/app/config/fingerprint.yml
      - poirot_data:/app/data
      - scanner_sources:/app/sources
      - ./config/.env:/app/.env
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - hawk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================================
  # DEMO profile — MySQL + S3 + Kafka with synthetic PII
  # Start with: docker compose --profile demo up -d
  # ============================================================================

  hawk-mysql:
    image: mysql:8.0
    container_name: hawk-mysql
    profiles: ["demo"]
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pocdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hawk-network

  localstack:
    image: localstack/localstack:2.2
    container_name: localstack
    profiles: ["demo"]
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - DEBUG=1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/tmp/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hawk-network

  redpanda:
    image: redpandadata/redpanda:v23.3.21
    container_name: redpanda
    profiles: ["demo"]
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 512M
      - --mode
      - dev-container
      - --default-log-level=warn
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    networks:
      - hawk-network
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  demo-setup:
    image: safernandez666/poirot-scanner:${POIROT_TAG:-latest}
    container_name: demo-setup
    profiles: ["demo"]
    depends_on:
      hawk-mysql:
        condition: service_healthy
      localstack:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      - MYSQL_HOST=hawk-mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=rootpassword
      - MYSQL_DATABASE=pocdb
      - S3_ENDPOINT=http://localstack:4566
      - S3_BUCKET=poc-bucket
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    volumes:
      - scanner_sources:/app/sources
    command: python /app/demo_setup.py
    restart: "no"
    networks:
      - hawk-network

  # ============================================================================
  # ORACLE profile — Oracle XE 21c with synthetic PII
  # Start with: docker compose --profile oracle up -d
  # ============================================================================

  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-xe
    profiles: ["oracle"]
    environment:
      ORACLE_PASSWORD: ${DEMO_ORACLE_PASSWORD:-OracleDemo123}
      APP_USER: poirot
      APP_USER_PASSWORD: ${DEMO_ORACLE_APP_PASSWORD:-PoirotScan1}
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - hawk-network
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s

  oracle-setup:
    image: safernandez666/poirot-scanner:${POIROT_TAG:-latest}
    container_name: oracle-setup
    profiles: ["oracle"]
    platform: linux/amd64
    depends_on:
      oracle-xe:
        condition: service_healthy
    environment:
      - ORACLE_HOST=oracle-xe
      - ORACLE_PORT=1521
      - ORACLE_SERVICE=XEPDB1
      - ORACLE_USER=poirot
      - ORACLE_PASSWORD=${DEMO_ORACLE_APP_PASSWORD:-PoirotScan1}
    volumes:
      - ./scripts/oracle-seed.py:/app/oracle_seed.py
      - scanner_sources:/app/sources
    command: >
      sh -c "python /app/oracle_seed.py &&
             mkdir -p /app/sources &&
             echo 'SOURCE_ORACLE_DEMO={\"host\": \"oracle-xe\", \"password\": \"${DEMO_ORACLE_APP_PASSWORD:-PoirotScan1}\", \"port\": 1521, \"service_name\": \"XEPDB1\", \"user\": \"poirot\", \"connect_via\": \"service_name\"}' > /app/sources/oracle.env"
    restart: "no"
    networks:
      - hawk-network

  # ============================================================================
  # THEHIVE profile — TheHive 5 case management
  # Start with: docker compose --profile thehive up -d
  # ============================================================================

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    profiles: ["thehive"]
    environment:
      - MAX_HEAP_SIZE=1G
      - HEAP_NEWSIZE=256M
      - CASSANDRA_CLUSTER_NAME=thehive
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - hawk-network
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
    container_name: elasticsearch
    profiles: ["thehive"]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - cluster.name=thehive
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - hawk-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  thehive:
    image: strangebee/thehive:5.0
    platform: linux/amd64
    container_name: thehive
    profiles: ["thehive"]
    depends_on:
      cassandra:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      - JVM_OPTS=-Xms1G -Xmx1G
    volumes:
      - thehive_data:/opt/thehive/data
      - ./thehive-config/application.conf:/etc/thehive/application.conf:ro
    networks:
      - hawk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:9000/api/v1/status | grep -qE '200|401'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # ============================================================================
  # OLLAMA profile — Local AI for report generation
  # Start with: docker compose --profile ollama up -d
  # ============================================================================

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
    networks:
      - hawk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    entrypoint: >
      sh -c "
        /bin/ollama serve &
        sleep 5
        ollama pull ${OLLAMA_MODEL:-phi4-mini}
        wait
      "

networks:
  hawk-network:
    driver: bridge

volumes:
  poirot_data:
  keycloak_data:
  mysql_data:
  localstack_data:
  oracle_data:
  cassandra_data:
  elasticsearch_data:
  thehive_data:
  ollama_data:
  scanner_sources:
