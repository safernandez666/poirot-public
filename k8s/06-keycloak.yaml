# ── Keycloak (IAM / SSO) ─────────────────────────────────────────────────────
#
# Runs Keycloak 26.1 in dev mode with realm auto-import.
# The poirot-realm.json is mounted from a ConfigMap generated by kustomization.yaml.
# The custom login theme is mounted from another ConfigMap.
#
# Service exposes port 8080 internally (same as docker-compose).
# The dashboard connects to http://keycloak:8080.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: poirot
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.1
          args:
            - start-dev
            - --import-realm
            - --health-enabled=true
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: poirot-secret
                  key: KC_ADMIN_USER
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: poirot-secret
                  key: KC_ADMIN_PASSWORD
            - name: KC_DB
              value: dev-file
            - name: KC_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: poirot-secret
                  key: KEYCLOAK_PUBLIC_URL
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HTTP_PORT
              value: "8080"
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_SSL_REQUIRED
              valueFrom:
                secretKeyRef:
                  name: poirot-secret
                  key: KC_SSL_REQUIRED
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import/poirot-realm.json
              subPath: poirot-realm.json
              readOnly: true
            - name: theme-login-css
              mountPath: /opt/keycloak/themes/poirot/login/resources/css/login.css
              subPath: login.css
              readOnly: true
            - name: keycloak-data
              mountPath: /opt/keycloak/data
          livenessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: realm-import
          configMap:
            name: poirot-keycloak-realm
        - name: theme-login-css
          configMap:
            name: poirot-keycloak-theme
        - name: keycloak-data
          persistentVolumeClaim:
            claimName: keycloak-data
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: poirot
  labels:
    app: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
