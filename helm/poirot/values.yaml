# ── Poirot Helm Chart — Default Values ────────────────────────────────────────

# -- Global settings
namespace: poirot

# -- Dashboard (Flask API + Next.js frontend served by nginx)
dashboard:
  image: safernandez666/poirot-dashboard:latest
  replicas: 1
  service:
    type: NodePort
    port: 80
    nodePort: 30080
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10

# -- Hawk Scanner (kept alive for ad-hoc kubectl exec scans)
scanner:
  image: safernandez666/poirot-scanner:latest
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# -- Keycloak (IAM / SSO)
keycloak:
  enabled: true
  image: quay.io/keycloak/keycloak:26.1
  replicas: 1
  service:
    port: 8080
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  livenessProbe:
    initialDelaySeconds: 120
    periodSeconds: 30
    failureThreshold: 5
  readinessProbe:
    initialDelaySeconds: 60
    periodSeconds: 10

# -- Persistent Volume Claims
persistence:
  data:
    size: 2Gi
    accessMode: ReadWriteOnce
    storageClass: ""       # leave empty for cluster default
  config:
    size: 256Mi
    accessMode: ReadWriteOnce
    storageClass: ""
  keycloak:
    size: 1Gi
    accessMode: ReadWriteOnce
    storageClass: ""

# -- Ingress (disabled by default — NodePort is the default access method)
ingress:
  enabled: false
  className: nginx
  host: poirot.example.com
  annotations: {}
  tls: []

# -- Auth / Keycloak config
auth:
  enabled: "true"
  kcAdminUser: admin
  kcAdminPassword: admin
  keycloakUrl: "http://keycloak:8080"
  keycloakRealm: poirot
  keycloakClientId: poirot-api
  keycloakPublicUrl: "http://localhost:8180"    # change for production
  kcSslRequired: "none"                          # "external" for production

# -- Notifications (all disabled by default)
notifications:
  slack:
    enabled: "false"
    webhookUrl: ""
  smtp:
    enabled: "false"
    host: "smtp.gmail.com"
    port: "587"
    useTls: "true"
    username: ""
    password: ""
    fromAddress: ""
    fromName: "Poirot Security"
    toAddresses: ""
    emailTheme: "dark_cyber"
  thehive:
    enabled: "false"
    apiKey: ""
    url: "http://thehive:9000"

# -- AI / Ollama
ai:
  provider: "ollama"           # "ollama" or "openrouter"
  ollama:
    enabled: "false"
    url: "http://ollama:11434"
    model: "llama3.2:3b"
  openrouter:
    apiKey: ""
    model: "openrouter/auto"

# -- Data Sources (JSON-encoded — uncomment and fill in values.yaml or use --set)
# Format: SOURCE_<TYPE>_<NAME>: '<JSON>'
dataSources: {}
  # SOURCE_KAFKA_DEMO: '{"bootstrap_servers":"redpanda:9092","topics":"transactions","max_messages":"500","group_id":"poirot-scanner"}'
  # SOURCE_MYSQL_PROD: '{"host":"db.example.com","port":3306,"user":"scanner","password":"s3cr3t","database":"prod"}'
  # SOURCE_S3_MAIN: '{"access_key":"AKIA...","secret_key":"...","bucket_name":"my-bucket","region":"us-east-1"}'

# -- ConfigMap file paths (relative to chart root or absolute)
# These are used by the configmap-files template.
# If installing from k8s/charts/poirot/, defaults point to repo root files.
configFiles:
  fingerprintYml: ""       # auto-detected from repo layout
  connectionYml: ""
  notificationManagerPy: ""
  realmJson: ""
  loginCss: ""
