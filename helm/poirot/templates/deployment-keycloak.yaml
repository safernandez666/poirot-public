{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "poirot.fullname" . }}-keycloak
  namespace: {{ .Values.namespace.name }}
  labels: {{ include "poirot.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  replicas: 1
  selector:
    matchLabels: {{ include "poirot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: keycloak
  template:
    metadata:
      labels: {{ include "poirot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
          args:
            - start-dev
            - --import-realm
            - --health-enabled=true
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.keycloak.adminUser | quote }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: {{ .Values.keycloak.adminPassword | quote }}
            - name: KC_DB
              value: dev-file
            - name: KC_HOSTNAME
              value: {{ .Values.keycloak.publicUrl | quote }}
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HTTP_PORT
              value: "8080"
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_SSL_REQUIRED
              value: {{ .Values.keycloak.sslRequired | quote }}
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import/poirot-realm.json
              subPath: poirot-realm.json
              readOnly: true
            - name: theme-login-css
              mountPath: /opt/keycloak/themes/poirot/login/resources/css/login.css
              subPath: login.css
              readOnly: true
            - name: keycloak-data
              mountPath: /opt/keycloak/data
          livenessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          resources: {{ toYaml .Values.keycloak.resources | nindent 12 }}
      volumes:
        - name: realm-import
          configMap:
            name: {{ include "poirot.fullname" . }}-keycloak-realm
        - name: theme-login-css
          configMap:
            name: {{ include "poirot.fullname" . }}-keycloak-theme
        - name: keycloak-data
          persistentVolumeClaim:
            claimName: {{ include "poirot.fullname" . }}-keycloak-data
{{- end }}
