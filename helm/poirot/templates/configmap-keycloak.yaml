{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "poirot.fullname" . }}-keycloak-realm
  namespace: {{ .Values.namespace.name }}
  labels: {{ include "poirot.labels" . | nindent 4 }}
data:
  poirot-realm.json: |
    {{- .Files.Get "files/poirot-realm.json" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "poirot.fullname" . }}-keycloak-theme
  namespace: {{ .Values.namespace.name }}
  labels: {{ include "poirot.labels" . | nindent 4 }}
data:
  login.css: |
    {{- .Files.Get "files/login.css" | nindent 4 }}
{{- end }}
