apiVersion: v1
kind: Secret
metadata:
  name: poirot-secret
  namespace: {{ include "poirot.namespace" . }}
  labels:
    {{- include "poirot.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ── Auth / Keycloak ──
  AUTH_ENABLED: {{ .Values.auth.enabled | quote }}
  KC_ADMIN_USER: {{ .Values.auth.kcAdminUser | quote }}
  KC_ADMIN_PASSWORD: {{ .Values.auth.kcAdminPassword | quote }}
  KEYCLOAK_URL: {{ .Values.auth.keycloakUrl | quote }}
  KEYCLOAK_REALM: {{ .Values.auth.keycloakRealm | quote }}
  KEYCLOAK_CLIENT_ID: {{ .Values.auth.keycloakClientId | quote }}
  KEYCLOAK_PUBLIC_URL: {{ .Values.auth.keycloakPublicUrl | quote }}
  KC_SSL_REQUIRED: {{ .Values.auth.kcSslRequired | quote }}

  # ── Notifications ──
  SLACK_ENABLED: {{ .Values.notifications.slack.enabled | quote }}
  SLACK_WEBHOOK_URL: {{ .Values.notifications.slack.webhookUrl | quote }}
  SMTP_ENABLED: {{ .Values.notifications.smtp.enabled | quote }}
  SMTP_HOST: {{ .Values.notifications.smtp.host | quote }}
  SMTP_PORT: {{ .Values.notifications.smtp.port | quote }}
  SMTP_USE_TLS: {{ .Values.notifications.smtp.useTls | quote }}
  SMTP_USERNAME: {{ .Values.notifications.smtp.username | quote }}
  SMTP_PASSWORD: {{ .Values.notifications.smtp.password | quote }}
  SMTP_FROM_ADDRESS: {{ .Values.notifications.smtp.fromAddress | quote }}
  SMTP_FROM_NAME: {{ .Values.notifications.smtp.fromName | quote }}
  SMTP_TO_ADDRESSES: {{ .Values.notifications.smtp.toAddresses | quote }}
  SMTP_EMAIL_THEME: {{ .Values.notifications.smtp.emailTheme | quote }}
  THEHIVE_ENABLED: {{ .Values.notifications.thehive.enabled | quote }}
  THEHIVE_API_KEY: {{ .Values.notifications.thehive.apiKey | quote }}

  # ── AI ──
  AI_PROVIDER: {{ .Values.ai.provider | quote }}
  OLLAMA_ENABLED: {{ .Values.ai.ollama.enabled | quote }}
  OLLAMA_URL: {{ .Values.ai.ollama.url | quote }}
  OLLAMA_MODEL: {{ .Values.ai.ollama.model | quote }}
  OPENROUTER_API_KEY: {{ .Values.ai.openrouter.apiKey | quote }}
  OPENROUTER_MODEL: {{ .Values.ai.openrouter.model | quote }}

  # ── Data Sources ──
  {{- range $key, $val := .Values.dataSources }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
